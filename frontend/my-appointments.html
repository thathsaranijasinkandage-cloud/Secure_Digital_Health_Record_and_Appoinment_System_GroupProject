<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container medium-container">

    <h1>MediX</h1>
    <h3>My Appointments</h3>

    <p>View and manage your appointments with our doctors</p>

    <table class="appointments-table">
        <tr>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        <tr>
            <td>Dr. Silva</td>
            <td>2026-04-25</td>
            <td>10:00 AM</td>
            <td>Pending</td>
            <td>
                <button class="edit-btn">Edit</button>
                <button class="cancel-btn">Cancel</button>
            </td>
        </tr>

        <tr>
            <td>Dr. Perera</td>
            <td>2026-04-26</td>
            <td>02:00 PM</td>
            <td>Approved</td>
            <td>
                <button class="edit-btn">Edit</button>
                <button class="cancel-btn">Cancel</button>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
