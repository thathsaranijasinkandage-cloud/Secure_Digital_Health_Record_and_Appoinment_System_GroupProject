<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Appointments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>MediX</h2>
        <ul>
            <li><a href="doctor-dashboard.html">Dashboard</a></li>
            <li><a href="#">Manage Appointments</a></li>
            <li><a href="medical-records.html">Update Records</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </div>

    <div class="main">

        <h1>Manage Appointments</h1>

        <table class="appointments-table">
            <tr>
                <th>Patient</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>

            <tr>
                <td>John Doe</td>
                <td>2026-04-25</td>
                <td>10:00 AM</td>
                <td>Pending</td>
                <td>
                    <button class="edit-btn">Accept</button>
                    <button class="cancel-btn">Reject</button>
                </td>
            </tr>

            <tr>
                <td>Mary Silva</td>
                <td>2026-04-25</td>
                <td>11:30 AM</td>
                <td>Approved</td>
                <td>
                    <button class="edit-btn">Complete</button>
                </td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
