<body>

<div class="container medical-container">

    <h1>CareConnect</h1>

            <td><a href="#" class="btn">Download</a></td>
        </tr>

        <tr>
            <td>2026-03-15</td>
            <td>Dental Check</td>
            <td>Routine cleaning</td>
            <td><a href="#" class="btn">Download</a></td>
        </tr>

    </table>

</div>

</body>
</html>
